name: frontend-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Verify Playwright discovery
        run: pnpm exec playwright test --config ./playwright.config.cjs --list
